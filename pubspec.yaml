name: battery_optymizer
description: "Battery Optimization App - Monitor and optimize your device battery."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^8.0.3
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.5
  shimmer: ^3.0.0
  gap: ^3.0.1
  circle_nav_bar: ^2.2.0
  curved_navigation_bar: ^1.0.6
  curved_labeled_navigation_bar: ^2.0.6
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf

        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500

        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

  assets:
    - assets/icons/
    - assets/icons/svg/
    - assets/images/
